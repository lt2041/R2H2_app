<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}R2H2{% endblock %}</title>

    <!-- Google Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Ubuntu font -->
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Michroma font (logo) -->
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">

    <!-- Materialize -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- R2H2 base theme -->
    <link rel="stylesheet" href="{% static 'dashboard/css/base.css' %}">

    <!-- Favicon (SVG primary) -->
    <link rel="icon" type="image/svg+xml" href="{% static 'dashboard/images/favicon.svg' %}">
    <!-- PNG fallback (optional) -->
    <link rel="alternate icon" type="image/ico" href="{% static 'dashboard/images/favicon.ico' %}">


    <style>
        .material-symbols-outlined {
            vertical-align: middle;
            transform: translate(0, -2px);
        }
        /* Sidenav icons need spacing */
        .sidenav li > a > .material-symbols-outlined {
            padding: 0 20px 0 0;
        }
    </style>
    {% block extrahead %}{% endblock %}
</head>
<body>

    <!-- Top Navbar -->
    <nav class="teal lighten-2" style="height:56px; line-height:56px;">
        <div class="nav-wrapper">
            <div class="col s12" style="display:flex; align-items:center; height:100%;">
                <a href="{% url 'dashboard-landing' %}" class="brand-logo" style="margin-left:20px; font-size:1.5rem;">R2H2</a>
                <div id="breadcrumb-container" style="margin-left:292px; flex-grow:1;">
                    <!-- Breadcrumbs will be injected here by JS -->
                </div>
                <a href="#" data-target="slide-out" class="sidenav-trigger right" style="margin-right:20px;"><span class="material-symbols-outlined">menu</span></a>
            </div>
        </div>
    </nav>

    <!-- Sidebar logo -->


    <ul id="slide-out" class="sidenav sidenav-fixed teal lighten-3">
        <div style="margin: 1rem 2rem;">
            <span style="font-family:'Michroma',sans-serif; font-size:1.55rem;
                    color:#ffffff; letter-spacing:0.08em;">R2H2</span>
        </div>
        <li><a href="{% url 'dashboard-landing' %}" class="black-text">
            <span class="material-symbols-outlined">home</span>
            Home
        </a></li>
        <li><a href="{% url 'dashboard-simulations' %}" class="black-text">
            <span class="material-symbols-outlined">flowchart</span>
            Models & Simulations
        </a></li>
        <li><a href="{% url 'dashboard-home' %}" class="black-text">
            <span class="material-symbols-outlined">deployed_code</span>
            Component Library
        </a></li>
        <li><a href="{% url 'dashboard-wind-data' %}" class="black-text">
            <span class="material-symbols-outlined">air</span>
            Wind Data
        </a></li>
        <li><div class="divider"></div></li>
        <!-- <li><a href="#" class="black-text">
            <span class="material-symbols-outlined">settings</span>
            Settings
        </a></li> -->
        <li><a href="{% url 'dashboard-settings' %}" class="black-text">
            <span class="material-symbols-outlined">settings</span>
            Settings
        </a></li>
        <li><a href="{% url 'dashboard-help' %}" class="black-text">
            <span class="material-symbols-outlined">help</span>
            Help
        </a></li>
    </ul>

    <!-- Page Content -->
    <main style="margin-left: 300px; padding: 30px;">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Reformat UTC datetimes to browser local timezone (handles BST etc.) -->
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        // Datetime formatter
        const fmtLong  = new Intl.DateTimeFormat(undefined, {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
        const fmtShort = new Intl.DateTimeFormat(undefined, {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit', hour12:false});
        document.querySelectorAll('time.local-dt').forEach(function (el) {
            const dt = new Date(el.getAttribute('datetime'));
            if (isNaN(dt)) return;
            const hasSec = el.textContent.split(':').length === 3;
            el.textContent = (hasSec ? fmtLong : fmtShort).format(dt).replace(/,/g, '');
        });

        // Breadcrumb generator
        const breadcrumbContainer = document.getElementById('breadcrumb-container');
        if (breadcrumbContainer) {
            const path = window.location.pathname.replace(/\/+$/, '') || '/';
            const titleParts = document.title.split('—').map(s => s.trim()).filter(Boolean);
            const staticUrls = {
                home: "{% url 'dashboard-landing' %}",
                models: "{% url 'dashboard-simulations' %}",
                library: "{% url 'dashboard-home' %}",
                wind: "{% url 'dashboard-wind-data' %}",
                settings: "{% url 'dashboard-settings' %}",
                help: "{% url 'dashboard-help' %}",
            };

            function appendCrumb(label, href, isLast) {
                const node = document.createElement(isLast || !href ? 'span' : 'a');
                if (!isLast && href) {
                    node.href = href;
                    node.className = 'breadcrumb';
                } else {
                    node.className = 'breadcrumb';
                    node.style.cursor = 'default';
                }
                node.textContent = label;
                node.style.color = '#fff';
                node.style.fontWeight = isLast ? '100' : '300';
                node.style.fontSize = '1.5rem';
                node.style.opacity = isLast ? '1' : '0.65';
                breadcrumbContainer.appendChild(node);
            }

            function renderCrumbs(crumbs) {
                crumbs.forEach(function(crumb, i) {
                    appendCrumb(crumb.label, crumb.href, i === crumbs.length - 1);
                });
            }

            let crumbs = null;
            const simDetailMatch = path.match(/^\/simulations\/(\d+)$/);
            const runResultsMatch = path.match(/^\/simulations\/(\d+)\/run\/(\d+)\/results$/);
            const browseMatch = path.match(/^\/browse\/([^/]+)$/);

            if (path === '/' || path === staticUrls.home.replace(/\/+$/, '')) {
                crumbs = [{ label: 'Home', href: staticUrls.home }];
            } else if (path === staticUrls.models.replace(/\/+$/, '')) {
                crumbs = [{ label: 'Models', href: staticUrls.models }];
            } else if (simDetailMatch) {
                crumbs = [
                    { label: 'Models', href: staticUrls.models },
                    { label: titleParts[1] || 'Simulation', href: path + '/' },
                ];
            } else if (runResultsMatch) {
                const simPath = '/simulations/' + runResultsMatch[1] + '/';
                crumbs = [
                    { label: 'Models', href: staticUrls.models },
                    { label: titleParts[2] || 'Simulation', href: simPath },
                    { label: titleParts[1] || 'Run', href: simPath },
                    { label: titleParts[0] || 'Results', href: path + '/' },
                ];
            } else if (path === staticUrls.library.replace(/\/+$/, '')) {
                crumbs = [{ label: 'Component Library', href: staticUrls.library }];
            } else if (browseMatch) {
                crumbs = [
                    { label: 'Component Library', href: staticUrls.library },
                    { label: titleParts[1] || titleParts[0] || 'Browse', href: path + '/' },
                ];
            } else if (path === staticUrls.wind.replace(/\/+$/, '')) {
                crumbs = [{ label: 'Wind Data', href: staticUrls.wind }];
            } else if (path === staticUrls.settings.replace(/\/+$/, '')) {
                crumbs = [{ label: 'Settings', href: staticUrls.settings }];
            } else if (path === staticUrls.help.replace(/\/+$/, '')) {
                crumbs = [{ label: 'Help', href: staticUrls.help }];
            }

            if (!crumbs) {
                crumbs = titleParts.map(function(part, idx) {
                    return { label: part, href: idx === titleParts.length - 1 ? null : null };
                });
            }

            renderCrumbs(crumbs);
        }
    });
    </script>
    <!-- Materialize JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            M.Sidenav.init(document.querySelectorAll('.sidenav'), {edge:'left'});
        });
    </script>
</body>
</html>
